icon: https://apps.okteto.com/movies/icon.png

build:
  catalog:
    context: catalog

deploy:
  divert:
    driver: istio
    virtualServices:
      - name: catalog
        namespace: movies-shared
  commands:
  - name: Deploy Catalog
    command: helm upgrade --install catalog catalog/chart --set image=${OKTETO_BUILD_CATALOG_IMAGE}

external:
  shared:
    icon: okteto
    endpoints:
      - name: shared
        url: https://movies-movies-shared.$OKTETO_DOMAIN

dev:
  catalog:
    command: yarn start
    workdir: /src
    sync:
      - catalog:/src
    forward:
      - 9229:9229